name: Supabase Keepalive

on:
  schedule:
    - cron: '0 10 */2 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s \
          "${{ secrets.SUPABASE_URL }}/rest/v1/?select=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
